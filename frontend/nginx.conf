server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Backend API routes ----
    # Anything under these prefixes is proxied straight to the Django
    # backend container over the shared docker network (using its
    # container_name as the DNS hostname). Adjust the port (8000 below)
    # to match whatever your backend Dockerfile/Gunicorn actually binds to.
    location ~ ^/(api|users|admin|static|media)/ {
        proxy_pass http://arici_backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache hashed static assets aggressively
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpe?g|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- React Router SPA fallback ----
    # Anything that isn't an API path or a static asset falls back to
    # index.html so client-side routes like /auth/signup/, /explore/
    # are handled by React Router instead of returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}